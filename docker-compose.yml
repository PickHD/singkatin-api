services:
  nginx-gateway:
    container_name: nginx-gateway
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      - auth-service-http
      - shortener-service-http
      - user-service-http
  mongo:
    image: mongo
    container_name: mongo
    expose:
      - '27017'
    networks:
      - singkatin-dev
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis
    container_name: redis
    expose:
      - '6379'
    networks:
      - singkatin-dev
    volumes:
      - redis_data:/data
  amqp:
    image: rabbitmq:3-management-alpine
    container_name: amqp
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - singkatin-dev
    volumes:
        - ~/.docker-conf/rabbitmq/data/:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - '16686:16686'
      - '14268:14268'
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=debug
    networks:
      - singkatin-dev
  minio:
    image: minio/minio
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: singkatin
      MINIO_ROOT_PASSWORD: singkatin@dev
    volumes:
      - ~/.docker-conf/minio-data:/data
    command: server --console-address ":9001" /data
    networks:
      - singkatin-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: singkatin
      MINIO_ROOT_PASSWORD: singkatin@dev
      MINIO_BUCKET_NAME: singkatin
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 singkatin singkatin@dev;
      /usr/bin/mc mb myminio/singkatin --ignore-existing;
      /usr/bin/mc anonymous set download myminio/singkatin;
      exit 0;
      "
    networks:
      - singkatin-dev
  auth-service-http:
    container_name: auth-service-http
    build:
      context: .
      dockerfile: ./auth/build/http/Dockerfile
    expose:
      - '8080'
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      jaeger:
        condition: service_started
      redis:
        condition: service_started
  shortener-service-http:
    container_name: shortener-service-http
    build:
      context: .
      dockerfile: ./shortener/build/http/Dockerfile
    expose:
      - '8081'
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      amqp:
        condition: service_healthy
      jaeger:
        condition: service_started
  shortener-service-grpc:
    container_name: shortener-service-grpc
    build:
      context: .
      dockerfile: ./shortener/build/grpc/Dockerfile
    ports:
      - '9091:9091'
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      amqp:
        condition: service_healthy
      jaeger:
        condition: service_started
  shortener-service-consumer:
    container_name: shortener-service-consumer
    build:
      context: .
      dockerfile: ./shortener/build/consumer/Dockerfile
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      amqp:
        condition: service_healthy
      jaeger:
        condition: service_started
  user-service-http:
    container_name: user-service-http
    build:
      context: .
      dockerfile: ./user/build/http/Dockerfile
    expose:
      - '8082'
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      amqp:
        condition: service_healthy
      jaeger:
        condition: service_started
  upload-service-consumer:
    container_name: upload-service-consumer
    build:
      context: .
      dockerfile: ./upload/build/consumer/Dockerfile
    networks:
      - singkatin-dev
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_started
      amqp:
        condition: service_healthy
      jaeger:
        condition: service_started
networks:
  singkatin-dev:
    driver: bridge
volumes:
    mongo_data:
    redis_data: