# ============================================================
# NGINX API Gateway - Singkatin Microservices
# ============================================================

# ---------- Rate Limiting ----------
limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=10r/s;

# ---------- Upstreams ----------
upstream auth_service {
    server auth-service-http:8080;
}

upstream shortener_service {
    server shortener-service-http:8081;
}

upstream user_service {
    server user-service-http:8082;
}

# ---------- HTTP → HTTPS Redirect ----------
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- Main HTTPS Server ----------
server {
    listen 443 ssl;
    server_name _;

    # --- SSL ---
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # --- Common Proxy Headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ==========================================================
    #  CORS Preflight (handles OPTIONS for all /api/* routes)
    # ==========================================================
    location @cors_preflight {
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;
        add_header 'Access-Control-Max-Age'       1728000;
        add_header 'Content-Type'                 'text/plain; charset=utf-8';
        add_header 'Content-Length'                0;
        return 204;
    }

    # ==========================================================
    #  Auth Service  →  /api/v1/auth/*
    # ==========================================================
    location /api/v1/auth/ {
        # Rate limiting
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'                0;
            return 204;
        }

        # CORS response headers
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;

        # Strip /api/v1/auth and forward as /v1
        rewrite ^/api/v1/auth/(.*)$ /v1/$1 break;
        proxy_pass http://auth_service;
    }

    # ==========================================================
    #  Shortener Service  →  /api/v1/shortener/*
    # ==========================================================
    location /api/v1/shortener/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'                0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;

        rewrite ^/api/v1/shortener/(.*)$ /v1/$1 break;
        proxy_pass http://shortener_service;
    }

    # ==========================================================
    #  User Service  →  /api/v1/user/*
    # ==========================================================
    location /api/v1/user/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'                0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, Cache-Control, X-Requested-With' always;

        rewrite ^/api/v1/user/(.*)$ /v1/$1 break;
        proxy_pass http://user_service;
    }

    # ==========================================================
    #  Short URL Redirect  →  /s/:short_url  (alias)
    # ==========================================================
    location /s/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        rewrite ^/s/(.*)$ /v1/$1 break;
        proxy_pass http://shortener_service;
    }

    # ==========================================================
    #  Root-Level Short URL  →  /:code  (e.g. /abc123)
    #  Matches 4-10 alphanumeric chars directly at root.
    #  This is the canonical, shortest redirect path.
    # ==========================================================
    location ~ "^/([a-zA-Z0-9]{4,10})$" {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        rewrite ^/(.*)$ /v1/$1 break;
        proxy_pass http://shortener_service;
    }

    # ==========================================================
    #  Health Check (gateway level)
    # ==========================================================
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx-gateway"}';
        add_header Content-Type application/json;
    }

    # ==========================================================
    #  Default — 404
    # ==========================================================
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
